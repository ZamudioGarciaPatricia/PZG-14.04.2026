{% extends "base.html" %}

{% block title %}Inicio{% endblock %}

{% block content %}
<div class="py-5"> 
    <div class="container text-center">
        <div class="row align-items-center g-4"> 
            <div class="col-md-6">
                <img src="/static/inicio.jpg" class="img-fluid rounded shadow" alt="Inicio">
            </div>

            <div class="col-md-6">
                <div class="card bg-danger bg-opacity-25 border-0 shadow-sm p-4">
                    <div class="card-body">
                        <h1 class="display-4 fw-bold"> CON LULA </h1>
                        <p class="lead text-body-secondary mt-2">tienes tiempo para todo</p>
                        <hr class="my-4 text-danger"> 
                        <h2 class="h4 text-uppercase">Empieza a organizar tu tiempo ahora</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5 pt-3">
            <div class="col">
                <a href="/creacuenta" class="btn btn-outline-danger w-100 py-2">Crea cuenta</a>
            </div>
            <div class="col">
                <div class="vr h-100 mx-auto"></div> 
            </div>
            <div class="col">
                <a href="/iniciasesion" class="btn btn-danger w-100 py-2">Inicia sesión</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
